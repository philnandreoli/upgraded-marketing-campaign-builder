services:
  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Containerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
