name: Backend Worker

on:
  push:
    branches: [main]
    paths:
      # Worker-specific paths
      - 'backend/worker.py'
      - 'backend/__main__.py'
      - 'backend/orchestration/**'
      - 'backend/agents/**'
      # Shared backend paths that affect the worker
      - 'backend/core/**'
      - 'backend/infrastructure/**'
      - 'backend/application/**'
      - 'backend/models/**'
      - 'backend/services/**'
      - 'backend/config.py'
      - 'backend/migrations/**'
      - 'backend/tests/**'
      - 'requirements.txt'
      - 'pytest.ini'
  pull_request:
    branches: [main]
    paths:
      - 'backend/worker.py'
      - 'backend/__main__.py'
      - 'backend/orchestration/**'
      - 'backend/agents/**'
      - 'backend/core/**'
      - 'backend/infrastructure/**'
      - 'backend/application/**'
      - 'backend/models/**'
      - 'backend/services/**'
      - 'backend/config.py'
      - 'backend/migrations/**'
      - 'backend/tests/**'
      - 'requirements.txt'
      - 'pytest.ini'

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        env:
          APP_ENV: test
          AUTH_ENABLED: "false"
          TRACING_ENABLED: "false"
          FOUNDRY_AGENTS_ENABLED: "false"
          AZURE_AI_PROJECT_ENDPOINT: "https://dummy.services.ai.azure.com/api/projects/test"
        run: pytest

  build-worker-image:
    name: Build Worker Container Image
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build worker image
        run: docker build -f deploy/worker.Dockerfile -t marketing-worker:ci .
