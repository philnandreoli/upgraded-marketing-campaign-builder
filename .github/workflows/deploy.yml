# Application Deployment Pipeline — Marketing Campaign Builder
#
# Builds all container images and deploys them through dev → test → prod,
# running the Azure-hosted schema migration job before any app revision is
# promoted in each environment.  A failed migration stops the rollout for
# that environment and all downstream environments.
#
# ── Execution model ──────────────────────────────────────────────────────────
#   Push to main  : build images
#                     → push + migrate + deploy  dev   (auto)
#                     → push + migrate + deploy  test  (approval-gated)
#                     → push + migrate + deploy  prod  (approval-gated)
#
# ── Deployment sequence per environment ──────────────────────────────────────
#   1. Push images to environment ACR
#   2. Trigger migration Container Apps Job in Azure
#   3. Poll until migration succeeds (failure aborts rollout)
#   4. Deploy worker revision
#   5. Deploy API revision
#   6. Deploy frontend revision
#   7. Write deployment summary (traffic is 100 % on new revision — Single mode)
#
# ── Authentication ────────────────────────────────────────────────────────────
#   All Azure operations use OIDC federated identity (no long-lived secrets).
#
#   Push jobs use GitHub Environment secrets (dev / test / prod):
#     AZURE_CLIENT_ID        — client ID of the environment's OIDC app
#     AZURE_TENANT_ID        — Azure tenant ID
#     AZURE_SUBSCRIPTION_ID
#
#   Migrate and deploy jobs use per-environment repository secrets so that
#   only one manual approval per environment is required (on the push job):
#     AZURE_CLIENT_ID_DEV    / AZURE_SUBSCRIPTION_ID_DEV
#     AZURE_CLIENT_ID_TEST   / AZURE_SUBSCRIPTION_ID_TEST
#     AZURE_CLIENT_ID_PROD   / AZURE_SUBSCRIPTION_ID_PROD
#     AZURE_TENANT_ID        — shared across environments
#
# ── OIDC federated-identity claims ───────────────────────────────────────────
#   Push   : repo:<owner>/<repo>:environment:<env>
#   Others : repo:<owner>/<repo>:ref:refs/heads/main
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/**'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  id-token: write

jobs:
  # ── 1. Build all container images ─────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        # Use the first 7 characters of the commit SHA as the image tag.
        # This ties every image unambiguously to the source commit.
        run: echo "image-tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: |
          docker build \
            -f deploy/api.Dockerfile \
            -t marketing-api:${{ steps.meta.outputs.image-tag }} \
            .

      - name: Build Worker image
        run: |
          docker build \
            -f deploy/worker.Dockerfile \
            -t marketing-worker:${{ steps.meta.outputs.image-tag }} \
            .

      - name: Build Migration image
        run: |
          docker build \
            -f deploy/migration.Dockerfile \
            -t marketing-migration:${{ steps.meta.outputs.image-tag }} \
            .

      - name: Build Frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg VITE_AZURE_CLIENT_ID=${{ secrets.VITE_AZURE_CLIENT_ID }} \
            --build-arg VITE_AZURE_TENANT_ID=${{ secrets.VITE_AZURE_TENANT_ID }} \
            --build-arg VITE_REDIRECT_URI=${{ secrets.VITE_REDIRECT_URI }} \
            --build-arg VITE_API_SCOPE=${{ secrets.VITE_API_SCOPE }} \
            -t marketing-frontend:${{ steps.meta.outputs.image-tag }} \
            frontend/

      - name: Export images as compressed tarballs
        run: |
          docker save marketing-api:${{ steps.meta.outputs.image-tag }} \
            | gzip > /tmp/marketing-api.tar.gz
          docker save marketing-worker:${{ steps.meta.outputs.image-tag }} \
            | gzip > /tmp/marketing-worker.tar.gz
          docker save marketing-migration:${{ steps.meta.outputs.image-tag }} \
            | gzip > /tmp/marketing-migration.tar.gz
          docker save marketing-frontend:${{ steps.meta.outputs.image-tag }} \
            | gzip > /tmp/marketing-frontend.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: container-images-${{ steps.meta.outputs.image-tag }}
          path: /tmp/*.tar.gz
          retention-days: 1

  # ╔═══════════════════════════════════════════════════════════════════════════
  # ║  DEV  (auto-deploy on push to main)
  # ╚═══════════════════════════════════════════════════════════════════════════

  # ── 2. Push images to dev ACR ─────────────────────────────────────────────
  push-dev:
    name: Push Images — dev
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      acr-server: ${{ vars.AZURE_CONTAINER_REGISTRY }}
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Push images to ACR
        uses: ./.github/actions/push-images
        with:
          image-tag: ${{ env.IMAGE_TAG }}
          acr-name: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
          acr-server: ${{ vars.AZURE_CONTAINER_REGISTRY }}
          artifact-name: container-images-${{ env.IMAGE_TAG }}

  # ── 3. Run schema migrations — dev ────────────────────────────────────────
  migrate-dev:
    name: Run Migrations — dev
    if: false
    needs: push-dev
    environment: dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run migration
        uses: ./.github/actions/run-migration
        with:
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP}}
          migration-job: caj-dev-migration

  # ── 4. Deploy app revisions — dev ─────────────────────────────────────────
  deploy-dev:
    name: Deploy — dev
    if: false
    needs: [build, push-dev, migrate-dev]
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
      RESOURCE_GROUP: rg-dev-marketing
      ACR_SERVER: ${{ needs.push-dev.outputs.acr-server }}
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_DEV }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_DEV }}

      - name: Deploy worker revision
        run: |
          az containerapp update \
            --name ca-dev-worker \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-worker:${{ env.IMAGE_TAG }}"

      - name: Deploy API revision
        run: |
          az containerapp update \
            --name ca-dev-api \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-api:${{ env.IMAGE_TAG }}"

      - name: Deploy frontend revision
        run: |
          az containerapp update \
            --name ca-dev-frontend \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-frontend:${{ env.IMAGE_TAG }}"

      - name: Deployment summary
        run: |
          TAG="${{ env.IMAGE_TAG }}"
          ACR="${{ env.ACR_SERVER }}"
          {
            echo "## ✅ Dev deployment complete"
            echo ""
            echo "| Component | Image |"
            echo "|-----------|-------|"
            echo "| API       | \`${ACR}/marketing-api:${TAG}\` |"
            echo "| Worker    | \`${ACR}/marketing-worker:${TAG}\` |"
            echo "| Frontend  | \`${ACR}/marketing-frontend:${TAG}\` |"
            echo ""
            echo "> Revision mode is **Single** — 100 % of traffic shifted to the new revision automatically."
          } >> "$GITHUB_STEP_SUMMARY"

  # ╔═══════════════════════════════════════════════════════════════════════════
  # ║  TEST  (requires approval on the test GitHub Environment)
  # ╚═══════════════════════════════════════════════════════════════════════════

  # ── 5. Push images to test ACR ────────────────────────────────────────────
  push-test:
    name: Push Images — test
    if: false
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: test
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Push images to ACR
        uses: ./.github/actions/push-images
        with:
          image-tag: ${{ env.IMAGE_TAG }}
          acr-name: acrtestmarketing
          acr-server: acrtestmarketing.azurecr.io
          artifact-name: container-images-${{ env.IMAGE_TAG }}

  # ── 6. Run schema migrations — test ───────────────────────────────────────
  migrate-test:
    name: Run Migrations — test
    needs: push-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Run migration
        uses: ./.github/actions/run-migration
        with:
          resource-group: rg-test-marketing
          migration-job: caj-test-migration

  # ── 7. Deploy app revisions — test ────────────────────────────────────────
  deploy-test:
    name: Deploy — test
    needs: [build, migrate-test]
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
      RESOURCE_GROUP: rg-test-marketing
      ACR_SERVER: acrtestmarketing.azurecr.io
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_TEST }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_TEST }}

      - name: Deploy worker revision
        run: |
          az containerapp update \
            --name ca-test-worker \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-worker:${{ env.IMAGE_TAG }}"

      - name: Deploy API revision
        run: |
          az containerapp update \
            --name ca-test-api \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-api:${{ env.IMAGE_TAG }}"

      - name: Deploy frontend revision
        run: |
          az containerapp update \
            --name ca-test-frontend \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-frontend:${{ env.IMAGE_TAG }}"

      - name: Deployment summary
        run: |
          TAG="${{ env.IMAGE_TAG }}"
          ACR="${{ env.ACR_SERVER }}"
          {
            echo "## ✅ Test deployment complete"
            echo ""
            echo "| Component | Image |"
            echo "|-----------|-------|"
            echo "| API       | \`${ACR}/marketing-api:${TAG}\` |"
            echo "| Worker    | \`${ACR}/marketing-worker:${TAG}\` |"
            echo "| Frontend  | \`${ACR}/marketing-frontend:${TAG}\` |"
            echo ""
            echo "> Revision mode is **Single** — 100 % of traffic shifted to the new revision automatically."
          } >> "$GITHUB_STEP_SUMMARY"

  # ╔═══════════════════════════════════════════════════════════════════════════
  # ║  PROD  (requires approval on the prod GitHub Environment)
  # ╚═══════════════════════════════════════════════════════════════════════════

  # ── 8. Push images to prod ACR ────────────────────────────────────────────
  push-prod:
    name: Push Images — prod
    if: false
    needs: [build, deploy-test]
    runs-on: ubuntu-latest
    environment: prod
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Push images to ACR
        uses: ./.github/actions/push-images
        with:
          image-tag: ${{ env.IMAGE_TAG }}
          acr-name: acrprodmarketing
          acr-server: acrprodmarketing.azurecr.io
          artifact-name: container-images-${{ env.IMAGE_TAG }}

  # ── 9. Run schema migrations — prod ───────────────────────────────────────
  migrate-prod:
    name: Run Migrations — prod
    needs: push-prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Run migration
        uses: ./.github/actions/run-migration
        with:
          resource-group: rg-prod-marketing
          migration-job: caj-prod-migration

  # ── 10. Deploy app revisions — prod ───────────────────────────────────────
  deploy-prod:
    name: Deploy — prod
    needs: [build, migrate-prod]
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
      RESOURCE_GROUP: rg-prod-marketing
      ACR_SERVER: acrprodmarketing.azurecr.io
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Deploy worker revision
        run: |
          az containerapp update \
            --name ca-prod-worker \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-worker:${{ env.IMAGE_TAG }}"

      - name: Deploy API revision
        run: |
          az containerapp update \
            --name ca-prod-api \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-api:${{ env.IMAGE_TAG }}"

      - name: Deploy frontend revision
        run: |
          az containerapp update \
            --name ca-prod-frontend \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_SERVER }}/marketing-frontend:${{ env.IMAGE_TAG }}"

      - name: Deployment summary
        run: |
          TAG="${{ env.IMAGE_TAG }}"
          ACR="${{ env.ACR_SERVER }}"
          {
            echo "## ✅ Prod deployment complete"
            echo ""
            echo "| Component | Image |"
            echo "|-----------|-------|"
            echo "| API       | \`${ACR}/marketing-api:${TAG}\` |"
            echo "| Worker    | \`${ACR}/marketing-worker:${TAG}\` |"
            echo "| Frontend  | \`${ACR}/marketing-frontend:${TAG}\` |"
            echo ""
            echo "> Revision mode is **Single** — 100 % of traffic shifted to the new revision automatically."
          } >> "$GITHUB_STEP_SUMMARY"
