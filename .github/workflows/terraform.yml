name: Terraform CI

on:
  workflow_dispatch:

jobs:
  tf:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - environment: dev
            enabled: ${{ needs.detect-changes.outputs.dev }}
          - environment: prod
            enabled: ${{ needs.detect-changes.outputs.prod }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan
