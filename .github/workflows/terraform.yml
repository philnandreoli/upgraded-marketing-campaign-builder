name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'

  # Allow manual runs for emergency applies / targeted environment actions.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev | test | prod)"
        required: true
        default: dev
        type: choice
        options: [dev, test, prod]
      action:
        description: "Terraform action (plan | apply)"
        required: true
        default: plan
        type: choice
        options: [plan, apply]

permissions:
  contents: read
  # Required for OIDC token exchange with Azure.
  id-token: write
  # Required to post plan summaries as PR comments.
  pull-requests: write

###############################################################################
# Environment-level concurrency: only one Terraform run per environment at a
# time so that state locking is never a bottleneck.
###############################################################################
concurrency:
  group: terraform-${{ github.event.inputs.environment || 'multi' }}
  cancel-in-progress: false

jobs:
  # ── Detect changed environments ─────────────────────────────────────────────
  detect-changes:
    name: Detect changed environments
    runs-on: ubuntu-latest
    outputs:
      dev:  ${{ steps.filter.outputs.dev }}
      test: ${{ steps.filter.outputs.test }}
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dev:
              - 'infra/environments/dev/**'
              - 'infra/modules/**'
            test:
              - 'infra/environments/test/**'
              - 'infra/modules/**'
            prod:
              - 'infra/environments/prod/**'
              - 'infra/modules/**'

  # ── Terraform plan/apply per environment ────────────────────────────────────
  terraform:
    name: Terraform ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, test, prod]

    # Map each environment to its GitHub Actions environment so that
    # environment-specific secrets and required reviewers apply.
    environment: ${{ matrix.environment }}

    env:
      TF_WORKING_DIR: infra/environments/${{ matrix.environment }}
      # Pass sensitive values to Terraform via TF_VAR_* env vars —
      # never hard-code them in tfvars files.
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id:       ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        if: |
          (needs.detect-changes.outputs.dev  == 'true' && matrix.environment == 'dev')  ||
          (needs.detect-changes.outputs.test == 'true' && matrix.environment == 'test') ||
          (needs.detect-changes.outputs.prod == 'true' && matrix.environment == 'prod') ||
          github.event_name == 'workflow_dispatch'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        if: |
          (needs.detect-changes.outputs.dev  == 'true' && matrix.environment == 'dev')  ||
          (needs.detect-changes.outputs.test == 'true' && matrix.environment == 'test') ||
          (needs.detect-changes.outputs.prod == 'true' && matrix.environment == 'prod') ||
          github.event_name == 'workflow_dispatch'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        if: |
          (needs.detect-changes.outputs.dev  == 'true' && matrix.environment == 'dev')  ||
          (needs.detect-changes.outputs.test == 'true' && matrix.environment == 'test') ||
          (needs.detect-changes.outputs.prod == 'true' && matrix.environment == 'prod') ||
          github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Format Check
        if: |
          (needs.detect-changes.outputs.dev  == 'true' && matrix.environment == 'dev')  ||
          (needs.detect-changes.outputs.test == 'true' && matrix.environment == 'test') ||
          (needs.detect-changes.outputs.prod == 'true' && matrix.environment == 'prod') ||
          github.event_name == 'workflow_dispatch'
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        if: |
          (needs.detect-changes.outputs.dev  == 'true' && matrix.environment == 'dev')  ||
          (needs.detect-changes.outputs.test == 'true' && matrix.environment == 'test') ||
          (needs.detect-changes.outputs.prod == 'true' && matrix.environment == 'prod') ||
          github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: |
          (needs.detect-changes.outputs.dev  == 'true' && matrix.environment == 'dev')  ||
          (needs.detect-changes.outputs.test == 'true' && matrix.environment == 'test') ||
          (needs.detect-changes.outputs.prod == 'true' && matrix.environment == 'prod') ||
          github.event_name == 'workflow_dispatch'
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -input=false \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "${status}"

      - name: Post plan summary (PR only)
        if: |
          github.event_name == 'pull_request' && (
            (needs.detect-changes.outputs.dev  == 'true' && matrix.environment == 'dev')  ||
            (needs.detect-changes.outputs.test == 'true' && matrix.environment == 'test') ||
            (needs.detect-changes.outputs.prod == 'true' && matrix.environment == 'prod')
          )
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n...[truncated]'
              : plan;
            const body = `### Terraform Plan — \
            \
            \
            \
            \
            \
${truncated}\n\
`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # Apply is only executed on push to main or an explicit workflow_dispatch apply.
      - name: Terraform Apply
        if: |
          ((needs.detect-changes.outputs.dev  == 'true' && matrix.environment == 'dev')  ||
           (needs.detect-changes.outputs.test == 'true' && matrix.environment == 'test') ||
           (needs.detect-changes.outputs.prod == 'true' && matrix.environment == 'prod') ||
           github.event_name == 'workflow_dispatch')
          && (
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' && github.event.inputs.environment == matrix.environment)
          )
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false tfplan

