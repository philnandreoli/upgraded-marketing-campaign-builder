name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        env:
          APP_ENV: test
          AUTH_ENABLED: "false"
          TRACING_ENABLED: "false"
          FOUNDRY_AGENTS_ENABLED: "false"
          AZURE_AI_PROJECT_ENDPOINT: "https://dummy.services.ai.azure.com/api/projects/test"
        run: pytest

  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  build-backend-image:
    name: Build Backend Container Image
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t backend:ci .

  build-frontend-image:
    name: Build Frontend Container Image
    runs-on: ubuntu-latest
    needs: frontend-lint-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t frontend:ci frontend/
