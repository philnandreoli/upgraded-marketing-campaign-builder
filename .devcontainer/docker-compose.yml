services:
  app:
    image: mcr.microsoft.com/devcontainers/python:2-3.12-bookworm
    volumes:
      - ..:/workspaces/marketing-campaign-builder
    command: sleep infinity
    extra_hosts:
      - "ai-managed-aiservices.openai.azure.com:20.62.58.5"
      - "AI-Managed-AIServices.services.ai.azure.com:20.62.58.5"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/campaigns
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campaigns
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    name: mcb-pgdata
